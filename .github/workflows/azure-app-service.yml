name: Azure App Service CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "20.x"
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package app
        run: >
          zip -r release.zip .
          -x ".git/*"
          -x ".github/*"
          -x ".azure/*"
          -x "node_modules/*"
          -x ".next/cache/*"
          -x ".env*"
          -x "*.pem"
          -x "release.zip"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: release.zip

      - name: Smoke test
        env:
          AZURE_WEBAPP_URL: ${{ secrets.AZURE_WEBAPP_URL }}
        run: |
          app_url="${AZURE_WEBAPP_URL:-https://${AZURE_WEBAPP_NAME}.azurewebsites.net}"
          curl --fail --retry 6 --retry-all-errors --retry-delay 10 "${app_url}/api/health"
