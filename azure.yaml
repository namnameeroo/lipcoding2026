name: ddak
metadata:
  template: ddak-nextjs@0.0.1

services:
  web:
    project: .
    language: js
    host: appservice
    dist: .next/standalone

hooks:
  prepackage:
    posix:
      shell: sh
      run: |
        npm run build
        cp -r public .next/standalone/public
        cp -r .next/static .next/standalone/.next/static
      continueOnError: false
      interactive: false
